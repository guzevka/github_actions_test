name: Fourth Workflow

on: 
  workflow_run: 
    workflows: [Third Workflow]
    types:
      - completed


jobs: 
  success-command: 
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Success
        run: echo "success :)))"
  failure-command:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: failure
        run: echo "failure :((("