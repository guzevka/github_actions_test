name: Second Workflow

on: push

jobs: 
  run-first-command: 
    runs-on: ubuntu-latest
    steps:
      - name: Display Python Version on ubuntu
        run: python --version
  run-parallel-command:
    runs-on: windows-latest
    steps:
      - name: Display Docker Version on windows
        run: docker version
  run-second-command:
    runs-on: macos-latest
    needs: run-first-command
    steps: 
      - name: Display Node Version on macos
        run: node -v
      